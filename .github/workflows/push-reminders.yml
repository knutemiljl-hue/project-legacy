name: Push reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-reminders
  cancel-in-progress: true

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call reminder endpoint
        env:
          REMINDERS_URL: ${{ secrets.REMINDERS_URL }}
        run: |
          if [ -z "$REMINDERS_URL" ]; then
            echo "REMINDERS_URL secret is not set"
            exit 1
          fi

          curl --fail --show-error --silent --max-time 30 "$REMINDERS_URL"
